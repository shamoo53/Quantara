name: CI Workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - 'quantara/web_app/**'
      - 'quantara/frontend/**'
      - 'devops/**'
  pull_request:
    branches:
      - main
    paths:
      - 'quantara/web_app/**'
      - 'quantara/frontend/**'
      - 'devops/**'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      working-directory: ./quantara

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: quantara
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: cp quantara/.env.dev .env

      - name: Start services and initialize database
        run: |
          docker compose -f devops/docker-compose.quantara.dev.yaml --env-file .env up -d --build
          # Wait for PostgreSQL to be ready (db healthcheck from compose)
          sleep 15
          # Run only existing migrations (never autogenerate)
          docker compose -f devops/docker-compose.quantara.dev.yaml exec -T backend poetry run alembic -c web_app/alembic.ini upgrade head

      - name: Run tests
        run: |
          docker compose -f devops/docker-compose.quantara.dev.yaml exec -T backend poetry run pytest web_app/tests

      - name: Run tests with coverage
        run: |
          docker compose -f devops/docker-compose.quantara.dev.yaml exec -T backend poetry run pytest web_app/tests --cov=web_app --cov-report=term-missing

      - name: Tear down
        if: always()
        run: |
          docker compose -f devops/docker-compose.quantara.dev.yaml down -v
